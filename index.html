<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<div class="shaheen-ultimate-os">
  <div class="os-glass-top">
    <div class="brand">🦅 SHAHEEN <span class="v-tag">V20 MASTER</span></div>
    <div class="live-signal"><span class="pulse-dot"></span> 100% کائنات ڈیٹا لنک</div>
  </div>

  <div class="matrix-core">
    <div class="search-engine-box">
      <select id="langSelect" onchange="applyUI()">
        <option value="ur">اردو</option>
        <option value="en">English</option>
        <option value="ar">العربية</option>
      </select>
      <input type="text" id="mainSearch" placeholder="سوال پوچھیں، شاہین جواب دے گا...">
      <button class="mega-scan-btn" onclick="masterDeepSearch()">
        <i class="fas fa-bolt"></i>
      </button>
    </div>

    <div id="results" class="data-viewport">
      <div class="intro-screen">
        <div class="loader-ring"></div>
        <h3>شاہین ڈیپ ڈیٹا انجن</h3>
        <p>عبدالباسط بھائی، میں ہر ویب سائٹ سے سیکھنے اور جواب دینے کے لیے تیار ہوں۔</p>
      </div>
    </div>
  </div>
</div>
